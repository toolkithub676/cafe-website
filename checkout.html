<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Checkout | Brew Haven</title>

<link rel="stylesheet"
href="css/checkout.css">

<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

</head>

<body>

<!-- ==========================
        NAVBAR
========================== -->

<header>

<nav class="navbar">

<div class="logo">

☕ Brew Haven

</div>

<a
href="cart.html"
class="back-btn">

← Back To Cart

</a>

</nav>

</header>

<!-- ==========================
      CHECKOUT PAGE
========================== -->

<section class="checkout-page">

<div class="checkout-container">

<!-- ==========================
      LEFT SIDE
========================== -->

<div class="checkout-left">

<h2>

Delivery Details

</h2>

<form id="checkoutForm">

<div class="input-group">

<label>

Full Name

</label>

<input
type="text"
id="customerName"
placeholder="Enter your full name"
required>

</div>

<div class="input-group">

<label>

Phone Number

</label>

<input
type="tel"
id="customerPhone"
placeholder="Enter phone number"
required>

</div>

<div class="input-group">

<label>

Email

</label>

<input
type="email"
id="customerEmail"
placeholder="Enter email address"
required>

</div>

<div class="input-group">

<label>

Delivery Address

</label>

<textarea
id="customerAddress"
rows="4"
placeholder="Enter complete address"
required>

</textarea>

</div>

<div class="input-group">

<label>

City

</label>

<input
type="text"
id="customerCity"
placeholder="Enter city"
required>

</div>

<div class="input-group">

<label>

Pincode

</label>

<input
type="number"
id="customerPincode"
placeholder="Enter pincode"
required>

</div>

<div class="input-group">

<label>

Payment Method

</label>

<select id="paymentMethod">

<option value="COD">

Cash On Delivery

</option>

<option value="ONLINE" disabled>

Online Payment (Coming Soon)

</option>

</select>

</div>

</form>

</div>
<!-- ==========================
      RIGHT SIDE
========================== -->

<div class="checkout-right">

<h2>

Order Summary

</h2>

<div
id="checkoutItems"
class="checkout-items">

<!-- Products Loaded By JS -->

</div>

<div class="summary-box">

<div class="summary-row">

<span>

Total Items

</span>

<b id="totalItems">

0

</b>

</div>

<div class="summary-row">

<span>

Subtotal

</span>

<b id="subtotal">

₹0

</b>

</div>

<div class="summary-row">

<span>

Delivery Charge

</span>

<b id="deliveryCharge">

₹40

</b>

</div>

<div class="summary-row grand-total">

<span>

Grand Total

</span>

<b id="grandTotal">

₹40

</b>

</div>

<button
id="placeOrderBtn"
class="place-order">

🛍 Place Order

</button>

</div>

</div>

</div>

</section>

<!-- ==========================
        LOADING
========================== -->

<div
id="loadingOverlay"
class="loading-overlay"
style="display:none;">

<div class="loader"></div>

<p>

Placing Your Order...

</p>

</div>

<!-- ==========================
        TOAST
========================== -->

<div
id="toast"
class="toast">

Order Placed

</div>

<!-- ==========================
        FOOTER
========================== -->

<footer>

<h3>

☕ Brew Haven

</h3>

<p>

Fresh Coffee • Fresh Food • Fast Delivery

</p>

<p>

© 2026 Brew Haven. All Rights Reserved.

</p>

</footer>

<!-- ==========================
      JAVASCRIPT
========================== -->

<script type="module" src="js/checkout.js"></script>

</body>

</html>
