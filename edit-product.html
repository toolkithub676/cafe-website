<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Edit Product</title>

<link rel="stylesheet" href="edit-product.css">

</head>

<body>

<div class="container">

<h1>Edit Product</h1>

<form id="editForm">

<input
id="name"
type="text"
placeholder="Product Name"
required>

<textarea
id="description"
placeholder="Description"
required></textarea>

<input
id="price"
type="number"
placeholder="Price"
required>

<select id="category">

<option>Coffee</option>
<option>Tea</option>
<option>Snacks</option>
<option>Dessert</option>

</select>

<label>Change Product Image</label>

<input
type="file"
id="image"
accept="image/*">

<button type="submit">

Update Product

</button>

<p id="message"></p>

</form>

</div>

<script type="module" src="edit-product.js"></script>

</body>
</html>
