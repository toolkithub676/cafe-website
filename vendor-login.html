<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vendor Login</title>

<link rel="stylesheet" href="css/vendor-login.css">

</head>

<body>

<div class="container">

<h2>Vendor Login</h2>

<form id="loginForm">

<input
type="email"
id="email"
placeholder="Email"
required>

<input
type="password"
id="password"
placeholder="Password"
required>

<button type="submit">
Login
</button>

</form>

<p>
Don't have an account?
<a href="vendor-signup.html">
Create Account
</a>
</p>

<p id="message"></p>

</div>

<script type="module" src="js/vendor-login.js"></script>

</body>

</html>
