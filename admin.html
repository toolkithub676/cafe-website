<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendor Login | Brew Haven Cafe</title>

    <link rel="stylesheet" href="css/admin.css">
</head>

<body>

<div class="login-container">

    <h1>☕ Brew Haven Cafe</h1>

    <h2>Vendor Login</h2>

    <form id="loginForm">

        <input
            type="email"
            id="email"
            placeholder="Email"
            required
        >

        <input
            type="password"
            id="password"
            placeholder="Password"
            required
        >

        <button type="submit">
            Login
        </button>

    </form>

    <p id="message"></p>

</div>

<script src="js/admin.js"></script>

</body>
</html>
