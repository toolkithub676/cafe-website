<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Product | Brew Haven</title>

<link rel="stylesheet"
href="css/product.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

</head>

<body>

<!-- ==========================
        HEADER
========================== -->

<header>

<nav class="navbar">

<div class="logo">

☕ Brew Haven

</div>

<a href="index.html"
class="back-btn">

← Back

</a>

</nav>

</header>

<!-- ==========================
      PRODUCT PAGE
========================== -->

<section class="product-page">

<div class="product-container">

<!-- ==========================
      PRODUCT IMAGE
========================== -->

<div class="product-image">

<img
id="productImage"
src=""
alt="Product">

</div>

<!-- ==========================
      PRODUCT DETAILS
========================== -->

<div class="product-details">

<h1 id="productName">

Loading...

</h1>

<div class="rating">

⭐⭐⭐⭐⭐

<span id="reviewCount">

(0 Reviews)

</span>

</div>

<p class="vendor">

🏪

<span id="shopName">

Loading...

</span>

</p>

<h2 id="price">

₹0

</h2>

<p class="stock">

📦 Stock :

<b id="stock">

0

</b>

</p>

<p class="prep-time">

⏱ Preparation Time :

<b id="prepTime">

0

</b>

mins

</p>

<div

id="availability"

class="available">

Checking...

</div>
<!-- ==========================
      DESCRIPTION
========================== -->

<div class="description">

<h3>Description</h3>

<p id="description">

Loading...

</p>

</div>

<!-- ==========================
      QUANTITY
========================== -->

<div class="quantity-box">

<button id="minus">−</button>

<span id="quantity">1</span>

<button id="plus">+</button>

</div>

<!-- ==========================
      ACTION BUTTONS
========================== -->

<div class="action-buttons">

<button
id="wishlistBtn"
class="wishlist">

❤️ Wishlist

</button>

<button
id="cartBtn"
class="cart">

🛒 Add To Cart

</button>

<button
id="buyBtn"
class="buy">

⚡ Buy Now

</button>

</div>

</div>

</div>

</section>

<!-- ==========================
      RELATED PRODUCTS
========================== -->

<section class="related-products">

<h2>

You May Also Like

</h2>

<div

class="cards"

id="relatedContainer">

<!-- Related Products -->

</div>

</section>

<!-- ==========================
        FOOTER
========================== -->

<footer>

<p>

© 2026 Brew Haven Café.
All Rights Reserved.

</p>

</footer>

<!-- ==========================
      JAVASCRIPT
========================== -->

<script type="module" src="js/product.js"></script>

</body>

</html>
