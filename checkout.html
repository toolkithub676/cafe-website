<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Checkout | Brew Haven</title>

<link rel="stylesheet"
href="css/checkout.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

</head>

<body>

<!-- ==========================
        NAVBAR
========================== -->

<header>

<nav class="navbar">

<div class="logo">

☕ Brew Haven

</div>

<a href="cart.html"
class="back-btn">

← Back To Cart

</a>

</nav>

</header>

<!-- ==========================
      CHECKOUT SECTION
========================== -->

<section class="checkout-page">

<div class="checkout-container">

<!-- ==========================
      CUSTOMER DETAILS
========================== -->

<div class="customer-box">

<h2>

Delivery Details

</h2>

<form id="checkoutForm">

<div class="input-group">

<label>

Full Name

</label>

<input

type="text"

id="customerName"

placeholder="Enter your full name"

required>

</div>

<div class="input-group">

<label>

Phone Number

</label>

<input

type="tel"

id="customerPhone"

placeholder="Enter phone number"

required>

</div>

<div class="input-group">

<label>

Delivery Address

</label>

<textarea

id="customerAddress"

rows="5"

placeholder="Enter complete address"

required>

</textarea>

</div>

<div class="input-group">

<label>

Payment Method

</label>

<select id="paymentMethod">

<option value="COD">

Cash On Delivery

</option>

<option value="ONLINE">

Online Payment (Coming Soon)

</option>

</select>

</div>

</form>

</div>
