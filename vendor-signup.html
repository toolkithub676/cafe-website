<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vendor Signup</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="form-container">

<h2>Vendor Signup</h2>

<form id="signupForm">

<input
type="text"
id="name"
placeholder="Vendor Name"
required>

<input
type="email"
id="email"
placeholder="Email"
required>

<input
type="password"
id="password"
placeholder="Password"
required>

<button type="submit">
Create Account
</button>

<p id="message"></p>

</form>

</div>

<script type="module" src="js/vendor-signup.js"></script>

</body>
</html>
