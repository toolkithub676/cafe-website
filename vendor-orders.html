<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Vendor Orders | Brew Haven</title>

<link rel="stylesheet"
href="css/vendor-orders.css">

<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

</head>

<body>

<!-- ==========================
        NAVBAR
========================== -->

<header>

<nav class="navbar">

<div class="logo">

☕ Brew Haven

</div>

<div class="nav-buttons">

<a
href="vendor-dashboard.html"
class="dashboard-btn">

📊 Dashboard

</a>

<a
href="index.html"
class="home-btn">

🏠 Home

</a>

</div>

</nav>

</header>

<!-- ==========================
      VENDOR ORDERS
========================== -->

<section class="orders-page">

<div class="orders-container">

<div class="orders-header">

<h1>

📦 Customer Orders

</h1>

<p>

Manage all incoming customer orders.

</p>

</div>

<!-- ==========================
      EMPTY ORDERS
========================== -->

<div

id="emptyOrders"

class="empty-orders"

style="display:none;">

<h2>

No Orders Available

</h2>

<p>

New customer orders will appear here.

</p>

</div>

<!-- ==========================
      ORDERS LIST
========================== -->

<div

id="ordersContainer"

class="orders-list">

<!-- Orders Loaded By JS -->

</div>
  <!-- ==========================
      LOADING
========================== -->

<div
id="loadingOverlay"
class="loading-overlay"
style="display:none;">

<div class="loader"></div>

<p>

Loading Orders...

</p>

</div>

<!-- ==========================
      TOAST
========================== -->

<div
id="toast"
class="toast">

Order Updated

</div>

</div>

</section>

<!-- ==========================
        FOOTER
========================== -->

<div class="footer-content">

<h3>

</h3>

<p>

Vendor Order Management Panel
