<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Customer Login | Brew Haven</title>

<link rel="stylesheet" href="css/customer-login.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="login-container">

<div class="login-card">

<div class="icon">
👤
</div>

<h1>Customer Login</h1>

<p class="subtitle">
Welcome back! Login to order your favourite coffee & snacks.
</p>

<form id="loginForm">

<input
type="email"
id="email"
placeholder="Email Address"
required>

<div class="password-box">

<input
type="password"
id="password"
placeholder="Password"
required>

<span id="togglePassword" class="toggle-password">
👁️
</span>

</div>

<div class="remember-row">

<label>

<input type="checkbox" id="rememberMe">

Remember Me

</label>

<a href="#" id="forgotPassword">

Forgot Password?

</a>

</div>

<button type="submit">

Login

</button>

</form>

<p id="message"></p>

<div class="divider">

<span>OR</span>

</div>

<button
type="button"
class="google-btn"
id="googleLogin">

<img
src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"
alt="Google">

Continue with Google

</button>

<p class="firebase-text">

🔒 Secure Login powered by Firebase

</p>

<div class="bottom-text">

Don't have an account?

<a href="customer-signup.html">

Create Account

</a>

</div>

</div>

</div>

<script type="module" src="js/customer-login.js"></script>

</body>

</html>
