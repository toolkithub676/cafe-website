<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vendor Signup</title>

<link rel="stylesheet" href="css/vendor-signup.css">

</head>

<body>

<div class="container">

<h2>Create Vendor Account</h2>

<form id="signupForm">

<input
type="text"
id="name"
placeholder="Vendor Name"
required>

<input
type="email"
id="email"
placeholder="Email"
required>

<input
type="password"
id="password"
placeholder="Password"
required>

<button type="submit">
Create Account
</button>

</form>

<p>
Already have an account?
<a href="vendor-login.html">
Login Here
</a>
</p>

<p id="message"></p>

</div>

<script type="module" src="js/vendor-signup.js"></script>

</body>

</html>
