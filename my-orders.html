<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>My Orders | Brew Haven</title>

<link rel="stylesheet"
href="css/my-orders.css">

<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

</head>

<body>

<!-- ==========================
        NAVBAR
========================== -->

<header>

<nav class="navbar">

<div class="logo">

☕ Brew Haven

</div>

<div class="nav-buttons">

<a
href="index.html"
class="home-btn">

🏠 Home

</a>

<a
href="cart.html"
class="cart-btn">

🛒 Cart

</a>

</div>

</nav>

</header>

<!-- ==========================
      MY ORDERS
========================== -->

<section class="orders-page">

<div class="orders-container">

<div class="orders-header">

<h1>

📦 My Orders

</h1>

<p>

Track all your placed orders.

</p>

</div>

<!-- ==========================
      EMPTY ORDERS
========================== -->

<div

id="emptyOrders"

class="empty-orders"

style="display:none;">

<h2>

No Orders Yet

</h2>

<p>

Looks like you haven't placed any order.

</p>

<a
href="index.html"
class="shop-btn">

🍽 Start Ordering

</a>

</div>

<!-- ==========================
      ORDERS LIST
========================== -->

<div

id="ordersContainer"

class="orders-list">

<!-- Orders Loaded Here -->

</div>
<!-- ==========================
      LOADING
========================== -->

<div
id="loadingOverlay"
class="loading-overlay"
style="display:none;">

<div class="loader"></div>

<p>

Loading Orders...

</p>

</div>

<!-- ==========================
      TOAST
========================== -->

<div
id="toast"
class="toast">

Updated Successfully

</div>

</div>

</section>

<!-- ==========================
        FOOTER
========================== -->

<footer>

<div class="footer-content">

<h3>

☕ Brew Haven

</h3>

<p>

Fresh Coffee • Fresh Food • Fast Delivery

</p>

<p>

© 2026 Brew Haven. All Rights Reserved.

</p>

</div>

</footer>

<!-- ==========================
      JAVASCRIPT
========================== -->

<script
type="module"
src="js/my-orders.js">

</script>

</body>

</html>
