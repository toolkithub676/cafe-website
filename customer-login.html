<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Customer Login | Brew Haven</title>

<link rel="stylesheet" href="css/customer-login.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="login-container">

<div class="login-card">

<div class="icon">
👤
</div>

<h1>Customer Login</h1>

<p>
Login to order your favourite coffee & snacks.
</p>

<form id="loginForm">

<input
type="email"
id="email"
placeholder="Email Address"
required>

<input
type="password"
id="password"
placeholder="Password"
required>

<button type="submit">

Login

</button>

</form>

<p id="message"></p>

<div class="bottom-text">

Don't have an account?

<a href="customer-signup.html">

Create Account

</a>

</div>

</div>

</div>

<script type="module" src="js/customer-login.js"></script>

</body>

</html>
